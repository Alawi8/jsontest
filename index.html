<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON API - Alex Johnson Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'source-code-pro', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 8px 8px 0 0;
            color: white;
            border-bottom: 2px solid #667eea;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .endpoint {
            font-size: 0.95em;
            opacity: 0.9;
            margin: 8px 0;
        }

        .method {
            display: inline-block;
            background: #48bb78;
            color: #1e1e1e;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 8px;
        }

        .status {
            display: inline-block;
            background: #48bb78;
            color: #1e1e1e;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 15px;
        }

        .response-container {
            background: #252526;
            border: 1px solid #3e3e42;
            border-top: none;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        .response-header {
            background: #2d2d30;
            padding: 15px 20px;
            border-bottom: 1px solid #3e3e42;
            font-size: 0.9em;
            color: #858585;
        }

        .response-header strong {
            color: #d4d4d4;
        }

        .json-viewer {
            padding: 30px 20px;
            overflow-x: auto;
            max-height: 800px;
            overflow-y: auto;
        }

        .json-line {
            line-height: 1.6;
            font-size: 0.95em;
        }

        /* JSON Syntax Highlighting */
        .json-key {
            color: #9cdcfe;
        }

        .json-string {
            color: #ce9178;
        }

        .json-number {
            color: #b5cea8;
        }

        .json-boolean {
            color: #569cd6;
        }

        .json-null {
            color: #569cd6;
        }

        .json-bracket {
            color: #d4d4d4;
        }

        .json-indent-1 { margin-left: 20px; }
        .json-indent-2 { margin-left: 40px; }
        .json-indent-3 { margin-left: 60px; }
        .json-indent-4 { margin-left: 80px; }

        .copy-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .copy-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
        }

        .copy-btn.copied {
            background: #48bb78;
        }

        .expand-btn {
            background: #3e3e42;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 15px 20px;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .expand-btn:hover {
            background: #555;
            color: #fff;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin: 15px 20px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.3em;
            }

            .json-viewer {
                padding: 15px 10px;
                font-size: 0.85em;
            }

            .json-indent-1 { margin-left: 15px; }
            .json-indent-2 { margin-left: 30px; }
            .json-indent-3 { margin-left: 45px; }
            .json-indent-4 { margin-left: 60px; }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #3e3e42;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 Profile API</h1>
            <div class="endpoint">
                <span class="method">GET</span>
                <code>/api/profile</code>
                <span class="status">200 OK</span>
            </div>
        </div>

        <div class="response-container">
            <div class="response-header">
                <strong>Response:</strong> application/json
            </div>

            <div class="controls">
                <button class="expand-btn" onclick="toggleFormatting()">📋 Format</button>
                <button class="expand-btn" onclick="copyToClipboard()">📋 Copy JSON</button>
                <button class="expand-btn" onclick="downloadJSON()">⬇️ Download</button>
            </div>

            <div class="json-viewer" id="jsonViewer"></div>
        </div>
    </div>

    <button class="copy-btn" onclick="copyToClipboard()">Copy JSON</button>

    <script>
        const jsonData = {
            "name": "Alex Johnson",
            "email": "alex.johnson@example.com",
            "profession": "Software Engineer",
            "location": "Berlin, Germany",
            "summary": "Experienced developer specializing in web applications, API design, and cloud-native solutions.",
            "education": [
                {
                    "degree": "Master of Science in Computer Science",
                    "institution": "Technical University of Berlin",
                    "year": 2022
                },
                {
                    "degree": "Bachelor of Science in Information Technology",
                    "institution": "University of Manchester",
                    "year": 2020
                }
            ],
            "courses": [
                "Advanced JavaScript",
                "Cloud Architecture and Deployment",
                "Data Structures and Algorithms",
                "UX Design Fundamentals"
            ],
            "skills": [
                "JavaScript",
                "Node.js",
                "React",
                "TypeScript",
                "REST APIs",
                "Docker",
                "AWS"
            ],
            "experience": [
                {
                    "role": "Senior Software Engineer",
                    "company": "Innovatech Solutions",
                    "duration": "2023 - Present",
                    "responsibilities": [
                        "Lead full-stack development for enterprise web applications.",
                        "Design scalable APIs and microservices architecture.",
                        "Mentor junior engineers and conduct code reviews."
                    ]
                },
                {
                    "role": "Software Developer",
                    "company": "NextGen Apps",
                    "duration": "2020 - 2023",
                    "responsibilities": [
                        "Built responsive user interfaces using React.",
                        "Integrated third-party services and improved application performance.",
                        "Collaborated with product teams to define feature requirements."
                    ]
                }
            ],
            "certifications": [
                "AWS Certified Developer",
                "Certified Scrum Master"
            ],
            "contact": {
                "phone": "+49 30 1234 5678",
                "website": "https://www.alexjohnson.dev",
                "linkedin": "https://www.linkedin.com/in/alexjohnson"
            }
        };

        function syntaxHighlight(json, indent = 0) {
            let html = '';
            const indentClass = `json-indent-${Math.min(indent, 4)}`;

            if (json === null) {
                return `<span class="json-null">null</span>`;
            } else if (typeof json === 'boolean') {
                return `<span class="json-boolean">${json}</span>`;
            } else if (typeof json === 'number') {
                return `<span class="json-number">${json}</span>`;
            } else if (typeof json === 'string') {
                const escaped = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return `<span class="json-string">"${escaped}"</span>`;
            } else if (Array.isArray(json)) {
                if (json.length === 0) {
                    return '<span class="json-bracket">[]</span>';
                }
                html += '<span class="json-bracket">[</span>\n';
                for (let i = 0; i < json.length; i++) {
                    html += `<div class="${indentClass}">`;
                    html += syntaxHighlight(json[i], indent + 1);
                    if (i < json.length - 1) html += '<span class="json-bracket">,</span>';
                    html += '</div>\n';
                }
                html += `<div class="json-indent-${Math.max(0, indent - 1)}"><span class="json-bracket">]</span></div>`;
                return html;
            } else if (typeof json === 'object') {
                const keys = Object.keys(json);
                if (keys.length === 0) {
                    return '<span class="json-bracket">{}</span>';
                }
                html += '<span class="json-bracket">{</span>\n';
                for (let i = 0; i < keys.length; i++) {
                    const key = keys[i];
                    html += `<div class="${indentClass}">`;
                    html += `<span class="json-key">"${key}"</span><span class="json-bracket">: </span>`;
                    html += syntaxHighlight(json[key], indent + 1);
                    if (i < keys.length - 1) html += '<span class="json-bracket">,</span>';
                    html += '</div>\n';
                }
                html += `<div class="json-indent-${Math.max(0, indent - 1)}"><span class="json-bracket">}</span></div>`;
                return html;
            }
            return '';
        }

        function renderJSON() {
            const viewer = document.getElementById('jsonViewer');
            const highlighted = syntaxHighlight(jsonData);
            const lines = highlighted.split('\n').map(line => 
                `<div class="json-line">${line || '&nbsp;'}</div>`
            ).join('');
            viewer.innerHTML = lines;
        }

        function copyToClipboard() {
            const jsonString = JSON.stringify(jsonData, null, 2);
            navigator.clipboard.writeText(jsonString).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.classList.add('copied');
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        function downloadJSON() {
            const jsonString = JSON.stringify(jsonData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'profile.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function toggleFormatting() {
            const viewer = document.getElementById('jsonViewer');
            if (viewer.style.display === 'none') {
                viewer.style.display = 'block';
            } else {
                viewer.innerHTML = '<pre>' + JSON.stringify(jsonData, null, 2) + '</pre>';
            }
        }

        // Initialize on page load
        renderJSON();
    </script>
</body>
</html>
